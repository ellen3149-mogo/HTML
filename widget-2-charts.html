<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>預售屋統計分析</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--primary:#1a3a5c;--accent:#e8732a;--accent2:#2a9d8f;--border:#dde3ee;--bg:#f4f7fb;--shadow:0 2px 12px rgba(26,58,92,0.08)}
*{box-sizing:border-box}
body{background:var(--bg);font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;color:#222;margin:0;padding:12px}
.card{background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.chart-title{font-size:.97rem;font-weight:700;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.chart-title i{color:var(--accent);font-size:1.05rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}
.stat-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-pill{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:110px;box-shadow:var(--shadow)}
.stat-pill .sv{font-size:1.25rem;font-weight:700;color:var(--primary)}
.stat-pill .sl{font-size:.73rem;color:#6c7a94;margin-top:2px}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.spinner{width:36px;height:36px;border:4px solid #dde3ee;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--primary);font-weight:600}
.section-title{font-size:1.05rem;font-weight:700;color:var(--primary);border-left:4px solid var(--accent);padding-left:10px;margin-bottom:14px}
.dist-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.dist-btn{background:#e8f0fe;color:var(--primary);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:.8rem;cursor:pointer;font-weight:600;transition:.15s}
.dist-btn:hover,.dist-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">載入資料中，請稍候…</div>
</div>

<!-- Summary stats -->
<div class="stat-bar">
  <div class="stat-pill"><div class="sv" id="s-total">-</div><div class="sl">總筆數</div></div>
  <div class="stat-pill"><div class="sv" id="s-avgup">-</div><div class="sl">全區平均單價(元/坪)</div></div>
  <div class="stat-pill"><div class="sv" id="s-topd">-</div><div class="sl">最高均價行政區</div></div>
  <div class="stat-pill"><div class="sv" id="s-most">-</div><div class="sl">成交量最大區</div></div>
</div>

<!-- Chart 1: district avg unit price -->
<div class="card">
  <div class="chart-title"><i class="bi bi-bar-chart-fill"></i>各行政區平均單價（元/坪）</div>
  <canvas id="c1" height="200"></canvas>
</div>

<div class="grid2">
  <!-- Chart 2: count pie -->
  <div class="card">
    <div class="chart-title"><i class="bi bi-pie-chart-fill"></i>各區成交量佔比</div>
    <canvas id="c2" height="240"></canvas>
  </div>
  <!-- Chart 3: build type -->
  <div class="card">
    <div class="chart-title"><i class="bi bi-buildings-fill"></i>建物型態分布</div>
    <canvas id="c3" height="240"></canvas>
  </div>
</div>

<!-- Chart 4: price distribution -->
<div class="card">
  <div class="chart-title"><i class="bi bi-distribute-horizontal"></i>總價分布區間（萬元）</div>
  <canvas id="c4" height="160"></canvas>
</div>

<!-- Chart 5: room layout -->
<div class="card">
  <div class="chart-title"><i class="bi bi-grid-3x3"></i>格局分布（房數）</div>
  <div class="dist-filter" id="dist-filter"></div>
  <canvas id="c5" height="140"></canvas>
</div>

<script>
// !! REPLACE THIS URL WITH YOUR GITHUB RAW URL !!
const DATA_URL = './data.json';

const C={district:0,type:1,address:2,land_area:3,land_use:4,date:5,floor:6,total_floors:7,build_type:8,use:9,build_area:10,room:11,hall:12,bath:13,elevator:14,total_price:15,unit_price:16,parking_type:17,parking_area:18,parking_price:19,project_name:20,unit_no:21};
const PALETTE=['#1a3a5c','#e8732a','#2a9d8f','#f4a261','#457b9d','#e63946','#06d6a0','#ffd166','#118ab2','#ef476f','#264653','#a8dadc','#e9c46a','#073b4c','#2a9d8f','#c77dff','#48cae4','#90be6d','#f3722c','#277da1'];
let ALL=[], charts={}, selectedDist='';

async function loadData(){
  try{
    const r=await fetch(DATA_URL);
    ALL=await r.json();
    document.getElementById('loading').style.display='none';
    renderAll();
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:red;padding:20px">⚠️ 資料載入失敗，請確認 GitHub URL 設定正確</div>';
  }
}

function renderAll(){
  renderStats();
  renderC1();
  renderC2();
  renderC3();
  renderC4();
  buildDistFilter();
  renderC5('');
}

function renderStats(){
  const ups=ALL.filter(r=>r[C.unit_price]>0).map(r=>r[C.unit_price]);
  const avgUp=Math.round(ups.reduce((a,b)=>a+b,0)/ups.length);
  // dist stats
  const ds={};
  ALL.forEach(r=>{
    if(!ds[r[C.district]])ds[r[C.district]]={count:0,up_sum:0,up_n:0};
    ds[r[C.district]].count++;
    if(r[C.unit_price]>0){ds[r[C.district]].up_sum+=r[C.unit_price];ds[r[C.district]].up_n++;}
  });
  const sorted=Object.entries(ds).map(([d,s])=>({d,avg:s.up_n?Math.round(s.up_sum/s.up_n):0,count:s.count})).sort((a,b)=>b.avg-a.avg);
  const topCount=Object.entries(ds).sort((a,b)=>b[1].count-a[1].count)[0];
  document.getElementById('s-total').textContent=ALL.length.toLocaleString();
  document.getElementById('s-avgup').textContent=avgUp.toLocaleString();
  document.getElementById('s-topd').textContent=sorted[0].d;
  document.getElementById('s-most').textContent=topCount[0];
}

function getDistStats(){
  const ds={};
  ALL.forEach(r=>{
    const d=r[C.district];
    if(!ds[d])ds[d]={count:0,up_sum:0,up_n:0};
    ds[d].count++;
    if(r[C.unit_price]>0){ds[d].up_sum+=r[C.unit_price];ds[d].up_n++;}
  });
  return Object.entries(ds).map(([d,s])=>({d,avg:s.up_n?Math.round(s.up_sum/s.up_n):0,count:s.count})).filter(x=>x.avg>0).sort((a,b)=>b.avg-a.avg);
}

function renderC1(){
  const stats=getDistStats();
  const ctx=document.getElementById('c1');
  if(charts.c1)charts.c1.destroy();
  charts.c1=new Chart(ctx,{
    type:'bar',
    data:{labels:stats.map(s=>s.d),datasets:[{label:'均價(元/坪)',data:stats.map(s=>s.avg),backgroundColor:stats.map((_,i)=>PALETTE[i%PALETTE.length]),borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toLocaleString()+' 元/坪'}}},scales:{y:{ticks:{callback:v=>v.toLocaleString()},grid:{color:'#f0f0f0'}},x:{ticks:{font:{size:11}}}}}
  });
}

function renderC2(){
  const stats=getDistStats().sort((a,b)=>b.count-a.count);
  const ctx=document.getElementById('c2');
  if(charts.c2)charts.c2.destroy();
  charts.c2=new Chart(ctx,{
    type:'doughnut',
    data:{labels:stats.map(s=>s.d),datasets:[{data:stats.map(s=>s.count),backgroundColor:PALETTE}]},
    options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}}}
  });
}

function renderC3(){
  const bt={};
  ALL.forEach(r=>{const b=r[C.build_type]||'其他';bt[b]=(bt[b]||0)+1;});
  const sorted=Object.entries(bt).sort((a,b)=>b[1]-a[1]);
  const ctx=document.getElementById('c3');
  if(charts.c3)charts.c3.destroy();
  charts.c3=new Chart(ctx,{
    type:'bar',
    data:{labels:sorted.map(b=>b[0]),datasets:[{label:'筆數',data:sorted.map(b=>b[1]),backgroundColor:'#2a9d8f',borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f0f0f0'}}}}
  });
}

function renderC4(){
  const bands=[[0,500],[500,1000],[1000,1500],[1500,2000],[2000,3000],[3000,5000],[5000,99999]];
  const labels=['500萬以下','500-1000萬','1000-1500萬','1500-2000萬','2000-3000萬','3000-5000萬','5000萬以上'];
  const counts=bands.map(([lo,hi])=>ALL.filter(r=>{const tp=r[C.total_price]/10000;return tp>=lo&&tp<hi;}).length);
  const ctx=document.getElementById('c4');
  if(charts.c4)charts.c4.destroy();
  charts.c4=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'筆數',data:counts,backgroundColor:'#e8732a',borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f0f0f0'}},x:{ticks:{font:{size:10}}}}}
  });
}

function buildDistFilter(){
  const dists=[''].concat([...new Set(ALL.map(r=>r[C.district]))].filter(Boolean).sort());
  const wrap=document.getElementById('dist-filter');
  wrap.innerHTML=dists.map(d=>`<button class="dist-btn${d===''?' active':''}" onclick="selectDist('${d}',this)">${d||'全部'}</button>`).join('');
}

function selectDist(d,btn){
  selectedDist=d;
  document.querySelectorAll('.dist-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderC5(d);
}

function renderC5(dist){
  const data=dist?ALL.filter(r=>r[C.district]===dist):ALL;
  const rm={};
  data.forEach(r=>{const v=r[C.room];if(v>=0&&v<=6)rm[v]=(rm[v]||0)+1;});
  const labels=['0房','1房','2房','3房','4房','5房','6房以上'];
  const counts=[0,1,2,3,4,5,6].map(v=>rm[v]||0);
  const ctx=document.getElementById('c5');
  if(charts.c5)charts.c5.destroy();
  charts.c5=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'筆數',data:counts,backgroundColor:['#adb5bd','#457b9d','#2a9d8f','#e8732a','#e63946','#f4a261','#264653'],borderRadius:6}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#f0f0f0'}}}}
  });
}

loadData();
</script>
</body>
</html>
